<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TASK — Accedi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <div class="auth-wrapper">
        <div class="auth-brand">
            <span class="brand-mark">◈</span>
            <span class="brand-name">TASK</span>
        </div>

        <!-- LOGIN -->
        <div id="form-login" class="auth-card">
            <div class="auth-header">
                <h1>Bentornato.</h1>
                <p class="auth-sub">Accedi al tuo spazio di lavoro.</p>
            </div>
            <div class="field-group">
                <label class="field-label" for="login-email">EMAIL</label>
                <input type="email" id="login-email" class="field-input" placeholder="nome@dominio.com">
            </div>
            <div class="field-group">
                <label class="field-label" for="login-password">PASSWORD</label>
                <input type="password" id="login-password" class="field-input" placeholder="••••••••">
            </div>
            <button class="btn-primary" onclick="login()">Accedi</button>
            <p id="login-errore" class="msg-error"></p>
            <p class="auth-switch">Non hai un account? <a href="#" onclick="mostraRegistrazione()">Registrati</a></p>
        </div>

        <!-- REGISTRAZIONE -->
        <div id="form-registrazione" class="auth-card nascosto">
            <div class="auth-header">
                <h1>Crea account.</h1>
                <p class="auth-sub">Inizia a organizzare il tuo lavoro.</p>
            </div>
            <div class="field-group">
                <label class="field-label" for="reg-nome">NOME</label>
                <input type="text" id="reg-nome" class="field-input" placeholder="Il tuo nome">
            </div>
            <div class="field-group">
                <label class="field-label" for="reg-email">EMAIL</label>
                <input type="email" id="reg-email" class="field-input" placeholder="nome@dominio.com">
            </div>
            <div class="field-group">
                <label class="field-label" for="reg-password">PASSWORD</label>
                <input type="password" id="reg-password" class="field-input" placeholder="Min. 6 caratteri">
            </div>
            <button class="btn-primary" onclick="registrati()">Crea account</button>
            <p id="reg-errore" class="msg-error"></p>
            <p class="auth-switch">Hai già un account? <a href="#" onclick="mostraLogin()">Accedi</a></p>
        </div>

        <div class="auth-footer">
            <span class="mono-small">TASK v1.0 — Gestione obiettivi</span>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
