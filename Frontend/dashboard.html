<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TASK — Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-page">

    <!-- MODALE MODIFICA -->
    <div id="modale-modifica" class="modale-overlay nascosto">
        <div class="modale-card">
            <div class="panel-label">MODIFICA TASK</div>
            <div class="field-group">
                <label class="field-label">TITOLO</label>
                <input type="text" id="mod-titolo" class="field-input">
            </div>
            <div class="field-group">
                <label class="field-label">DESCRIZIONE</label>
                <textarea id="mod-descrizione" class="field-input field-textarea"></textarea>
            </div>
            <div class="form-row">
                <div class="field-group-inline">
                    <label class="field-label">PRIORITÀ</label>
                    <select id="mod-priorita" class="field-select">
                        <option value="bassa">Bassa</option>
                        <option value="media">Media</option>
                        <option value="alta">Alta</option>
                    </select>
                </div>
                <div class="field-group-inline">
                    <label class="field-label">SCADENZA</label>
                    <input type="date" id="mod-scadenza" class="field-input field-date">
                </div>
                <div class="field-group-inline">
                    <label class="field-label">CATEGORIA</label>
                    <select id="mod-categoria" class="field-select"></select>
                </div>
            </div>
            <input type="hidden" id="mod-id">
            <!-- Sezione condivisione (nascosta per ora) -->
            <input type="hidden" id="mod-share-email">
            <span id="share-msg"></span>
            <div class="form-row" style="justify-content: flex-end; margin-top: 8px;">
                <button class="btn-ghost" onclick="chiudiModale()">Annulla</button>
                <button class="btn-primary" onclick="salvaModifica()">Salva</button>
            </div>
        </div>
    </div>

    <!-- TOPBAR -->
    <header class="topbar">
        <div class="topbar-inner">
            <div class="topbar-brand">
                <span class="brand-mark"><svg width="20" height="20" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
  <rect x="3" y="3" width="14" height="14" rx="2" fill="none" stroke="currentColor" stroke-width="2"/>
  <line x1="7" y1="10" x2="13" y2="10" stroke="currentColor" stroke-width="2"/>
  <line x1="7" y1="7" x2="13" y2="7" stroke="currentColor" stroke-width="2"/>
  <line x1="7" y1="13" x2="10" y2="13" stroke="currentColor" stroke-width="2"/>
</svg></span>
                <span class="brand-name">TASK MANAGER</span>
            </div>
            <div class="topbar-user">
                <span class="mono-small" id="nome-utente"></span>
                <button class="btn-ghost" onclick="logout()">Esci</button>
            </div>
        </div>
    </header>

    <main class="dashboard-main">

        <!-- PAGE TITLE -->
        <div class="page-header">
            <h1 class="page-title">Crea e gestisci le tue task qui:</h1>
            <span class="mono-small" id="data-oggi"></span>
        </div>

       <!-- GRIGLIA SUPERIORE -->
<div class="dashboard-grid">

    <!-- NUOVA TASK -->
    <section class="panel">
        <div class="panel-label">NUOVA TASK</div>
        <div class="new-task-form">
            <input type="text" id="task-titolo" class="field-input field-large" placeholder="Descrivi la tua task…">
            <textarea id="task-descrizione" class="field-input field-textarea" placeholder="Note aggiuntive (opzionale)"></textarea>
            <div class="form-row">
                <div class="field-group-inline">
                    <label class="field-label">PRIORITÀ</label>
                    <select id="task-priorita" class="field-select">
                        <option value="bassa">Bassa</option>
                        <option value="media" selected>Media</option>
                        <option value="alta">Alta</option>
                    </select>
                </div>
                <div class="field-group-inline">
                    <label class="field-label">SCADENZA</label>
                    <input type="date" id="task-scadenza" class="field-input field-date">
                </div>
                <div class="field-group-inline">
                    <label class="field-label">CATEGORIA</label>
                    <select id="task-categoria" class="field-select">
                        <option value="">Nessuna</option>
                    </select>
                </div>
            </div>
            <p id="task-errore" class="msg-error"></p>
            <button class="btn-primary" style="margin-top: 12px;" onclick="creaTask()">+ Aggiungi</button>
        </div>
    </section>

    <!-- CATEGORIE -->
    <section class="panel">
        <div class="panel-label">CATEGORIE</div>
        <div class="form-row form-row-tight">
            <input type="text" id="cat-nome" class="field-input" placeholder="Nome categoria">
            <input type="color" id="cat-colore" class="field-color" value="#d97706">
            <button class="btn-outline" onclick="creaCategoria()">+ Aggiungi</button>
        </div>
        <div id="lista-categorie" class="categorie-list"></div>
    </section>

</div>
        <!-- IMPORT LISTA -->
<section class="panel">
    <div class="panel-label">CREA LA TUA LISTA</div>
    <div class="field-group">
        <label class="field-label">VUOI VELOCIZZARE IL TUO LAVORO? PER OGNI RIGA, VERRÀ CREATA UNA NUOVA TASK!</label>
        <textarea id="import-testo" class="field-input field-textarea" style="min-height: 120px" placeholder="Comprare il latte&#10;Studiare PHP&#10;Fare la spesa&#10;Chiamare il cliente"></textarea>
    </div>
    <div class="form-row" style="margin-top: 8px;">
        <div class="field-group-inline">
            <label class="field-label">PRIORITÀ</label>
            <select id="import-priorita" class="field-select">
                <option value="bassa">Bassa</option>
                <option value="media" selected>Media</option>
                <option value="alta">Alta</option>
            </select>
        </div>
        <button class="btn-primary" onclick="importaLista()">Importa task</button>
    </div>
    <p id="import-risultato" class="mono-small" style="margin-top: 8px;"></p>
</section>

        <!-- AZIONI IN BLOCCO -->
        <section class="bulk-bar">
            <label class="custom-check-wrap">
                <input type="checkbox" id="seleziona-tutto" onchange="selezionaTutto()">
                <span class="custom-check"></span>
                <span class="mono-small">Seleziona tutto</span>
            </label>
            <div class="bulk-actions">
                <button class="btn-ghost" onclick="completaSelezionate()">✓ Completa selezionate</button>
                <button class="btn-danger" onclick="eliminaSelezionate()">✕ Elimina selezionate</button>
                <button class="btn-ghost" onclick="condividiSelezionate()">⇄ Condividi selezionate</button>
            
            </div>
        </section>

        <!-- LISTA TASK -->
        <section class="tasks-section">
            <div id="lista-tasks" class="tasks-list"></div>
        </section>

        <div class="dashboard-grid">

            <!-- TASK CONDIVISE -->
            <section class="panel">
                <div class="panel-label">CONDIVISE CON ME</div>
                <div id="lista-condivise" class="tasks-list"></div>
            </section>
        </div>

    </main>

    <script src="app.js"></script>
</body>
</html>
